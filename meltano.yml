send_anonymous_usage_stats: true
project_id: "tap-cmic"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-cmic"
    namespace: "tap_cmic"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    # TODO: Declare settings and their types here:
    settings:
    - name: username
      label: Username
      description: The CMiC username

    - name: password
      label: Password
      description: The CMiC password
      sensitive: true

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: Initial date to start extracting data from

    - name: api_url
      label: API URL
      description: Base URL for the CMiC API

    # TODO: Declare required settings here:
    settings_group_validation:
    - [username, password]

    # TODO: Declare default configuration values here:
    config:
      start_date: 6 months ago
      api_url: https://partner-sandbox-api-basic.cmiccloud.com/cmicprtn

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
